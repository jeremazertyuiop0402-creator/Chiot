name: Build APK

on:
  push:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova project
      run: cordova create app com.chiots.app ChiotsApp

    - name: Copy site files
      run: |
        rm -rf app/www/*
        cp -r * app/www/

    - name: Add Android
      run: |
        cd app
        cordova platform add android

    - name: Build APK
      run: |
        cd app
        cordova build android

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: chiots-apk
        path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
