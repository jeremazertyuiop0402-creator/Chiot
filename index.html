<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Appel des Chiots</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{background:#0f0f1a;height:100%;width:100%;overflow:hidden;}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;}
.screen.active{display:flex;}
.paw-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.paw-float{position:absolute;opacity:0.06;animation:floatPaw 8s ease-in-out infinite;}
@keyframes floatPaw{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes bouncePaw{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ripple{0%{transform:scale(1);opacity:0.4}100%{transform:scale(3.5);opacity:0}}
@keyframes pulseGreen{0%,100%{box-shadow:0 8px 24px rgba(34,197,94,0.4)}50%{box-shadow:0 8px 48px rgba(34,197,94,0.9)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes typingDot{0%,100%{transform:translateY(0);opacity:0.5}50%{transform:translateY(-6px);opacity:1}}
@keyframes talkPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(99,200,99,0.5);transform:scale(1);}
  50%{box-shadow:0 0 0 22px rgba(99,200,99,0);transform:scale(1.06);}
}
@keyframes waveAnim{
  0%,100%{height:6px;}
  50%{height:22px;}
}

/* SELECTION */
#screen-select{background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);overflow-y:auto;justify-content:flex-start;padding:28px 16px 36px;}
.title-wrap{position:relative;z-index:1;text-align:center;margin-bottom:24px;}
.title-paws{font-size:2.6rem;display:flex;justify-content:center;gap:6px;margin-bottom:6px;}
.title-paws span{display:inline-block;}
.title-paws span:nth-child(1){animation:bouncePaw 1.2s 0s ease-in-out infinite}
.title-paws span:nth-child(2){animation:bouncePaw 1.2s 0.15s ease-in-out infinite}
.title-paws span:nth-child(3){animation:bouncePaw 1.2s 0.3s ease-in-out infinite}
h1{font-family:'Fredoka One',cursive;font-size:2rem;color:#fff;letter-spacing:1px;}
.subtitle{color:rgba(255,255,255,0.5);font-size:0.9rem;font-weight:700;margin-top:4px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;width:100%;max-width:380px;position:relative;z-index:1;}
.dog-card{background:rgba(255,255,255,0.05);border-radius:24px;padding:18px 10px;cursor:pointer;text-align:center;transition:transform 0.15s;backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,0.08);color:#fff;outline:none;}
.dog-card:active{transform:scale(0.93);}
.dog-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:2.2rem;border:3px solid rgba(255,255,255,0.25);}
.dog-name{font-family:'Fredoka One',cursive;font-size:1.25rem;}
.dog-role{font-size:0.7rem;color:rgba(255,255,255,0.45);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

/* APPEL ENTRANT */
#screen-incoming{justify-content:space-between;padding:70px 24px 70px;}
.inc-bg{position:absolute;inset:0;}
.inc-top{position:relative;z-index:2;text-align:center;}
.inc-label{color:rgba(255,255,255,0.55);font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;}
.inc-name{font-family:'Fredoka One',cursive;font-size:2.8rem;color:#fff;}
.inc-paws{display:flex;justify-content:center;gap:10px;margin-top:10px;font-size:1.5rem;}
.inc-paws span:nth-child(1){animation:bouncePaw 1s 0s ease-in-out infinite;display:inline-block}
.inc-paws span:nth-child(2){animation:bouncePaw 1s 0.2s ease-in-out infinite;display:inline-block}
.inc-paws span:nth-child(3){animation:bouncePaw 1s 0.4s ease-in-out infinite;display:inline-block}
.ripple-wrap{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center;z-index:2;}
.ripple-ring{position:absolute;width:120px;height:120px;border-radius:50%;opacity:0;}
.ripple-ring:nth-child(1){animation:ripple 2s 0s ease-out infinite}
.ripple-ring:nth-child(2){animation:ripple 2s 0.5s ease-out infinite}
.ripple-ring:nth-child(3){animation:ripple 2s 1s ease-out infinite}
.inc-avatar{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3.8rem;border:4px solid rgba(255,255,255,0.35);position:relative;z-index:3;}
.call-btns{display:flex;gap:60px;position:relative;z-index:2;}
.btn-circle{width:76px;height:76px;border-radius:50%;border:none;font-size:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-decline{background:#ef4444;box-shadow:0 8px 24px rgba(239,68,68,0.5);}
.btn-accept{background:#22c55e;animation:pulseGreen 1.5s ease-in-out infinite;}
.btn-circle:active{transform:scale(0.88);}

/* CONVERSATION */
#screen-call{justify-content:flex-start;}
.call-header{display:flex;align-items:center;gap:12px;width:100%;max-width:420px;padding:44px 20px 12px;position:relative;z-index:2;}
.call-avatar-sm{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:2px solid rgba(255,255,255,0.3);flex-shrink:0;}
.call-hname{font-family:'Fredoka One',cursive;font-size:1.35rem;color:#fff;}
.call-status{font-size:0.78rem;color:#22c55e;font-weight:700;display:flex;align-items:center;gap:4px;margin-top:2px;}
.status-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:blink 1s ease-in-out infinite;}
.chat-area{flex:1;width:100%;max-width:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 18px 8px;position:relative;z-index:2;scrollbar-width:none;}
.chat-area::-webkit-scrollbar{display:none;}
.bubble{max-width:78%;padding:11px 15px;border-radius:20px;font-size:0.95rem;font-weight:700;line-height:1.4;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.bubble-dog{align-self:flex-start;color:#fff;border-bottom-left-radius:4px;}
.bubble-user{align-self:flex-end;background:rgba(255,255,255,0.12);color:#fff;border-bottom-right-radius:4px;}
.typing-bubble{align-self:flex-start;border-radius:20px;border-bottom-left-radius:4px;padding:14px 18px;display:flex;gap:6px;align-items:center;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.typing-dot{width:8px;height:8px;background:rgba(255,255,255,0.8);border-radius:50%;}
.typing-dot:nth-child(1){animation:typingDot 1.2s 0s ease-in-out infinite}
.typing-dot:nth-child(2){animation:typingDot 1.2s 0.2s ease-in-out infinite}
.typing-dot:nth-child(3){animation:typingDot 1.2s 0.4s ease-in-out infinite}

/* ZONE CONTROLES */
.controls{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:8px 20px 32px;
  position:relative;z-index:2;width:100%;
}

/* GRAND BOUTON PARLER — remplace le micro */
.talk-btn{
  width:100px;height:100px;border-radius:50%;border:none;
  font-size:2.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
  position:relative;
}
.talk-btn.idle{
  background:linear-gradient(145deg,#3b82f6,#1d4ed8);
  box-shadow:0 6px 28px rgba(59,130,246,0.55);
}
.talk-btn.playing{
  background:linear-gradient(145deg,#22c55e,#15803d);
  animation:talkPulse 0.8s ease-in-out infinite;
}
.talk-btn.busy{
  background:#374151;
  opacity:0.5;
}
.talk-btn:active{transform:scale(0.9);}

/* Ondes sonores animées */
.sound-waves{
  display:none;
  gap:4px;align-items:center;justify-content:center;
  height:30px;
}
.sound-waves.visible{display:flex;}
.wave-bar{
  width:4px;border-radius:99px;
  background:currentColor;
  animation:waveAnim 0.6s ease-in-out infinite;
}
.wave-bar:nth-child(1){animation-delay:0s;   height:8px;}
.wave-bar:nth-child(2){animation-delay:0.1s; height:14px;}
.wave-bar:nth-child(3){animation-delay:0.2s; height:20px;}
.wave-bar:nth-child(4){animation-delay:0.1s; height:14px;}
.wave-bar:nth-child(5){animation-delay:0s;   height:8px;}

.mic-label{font-size:0.85rem;color:rgba(255,255,255,0.6);font-weight:800;text-align:center;letter-spacing:0.3px;}
.mic-status{font-size:0.82rem;font-weight:800;text-align:center;min-height:22px;padding:0 16px;}

.btn-hangup{background:#ef4444;border:none;color:#fff;padding:13px 36px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(239,68,68,0.5);}
.btn-hangup:active{transform:scale(0.93);}
</style>
</head>
<body>

<div class="paw-bg" id="pawBg"></div>

<!-- SELECTION -->
<div class="screen active" id="screen-select">
  <div class="title-wrap">
    <div class="title-paws"><span>🐾</span><span>🐾</span><span>🐾</span></div>
    <h1>Appel des Chiots</h1>
    <p class="subtitle">Qui veux-tu appeler ?</p>
  </div>
  <div class="grid" id="dogGrid"></div>
</div>

<!-- APPEL ENTRANT -->
<div class="screen" id="screen-incoming">
  <div class="inc-bg" id="incBg"></div>
  <div class="inc-top">
    <div class="inc-label">Appel entrant...</div>
    <div class="inc-name" id="incName">Chase</div>
    <div class="inc-paws"><span>🐾</span><span>🐾</span><span>🐾</span></div>
  </div>
  <div class="ripple-wrap">
    <div class="ripple-ring" id="ripple1"></div>
    <div class="ripple-ring" id="ripple2"></div>
    <div class="ripple-ring" id="ripple3"></div>
    <div class="inc-avatar" id="incAvatar">🐕</div>
  </div>
  <div class="call-btns">
    <button class="btn-circle btn-decline" onclick="declineCall()">📵</button>
    <button class="btn-circle btn-accept"  onclick="acceptCall()">📞</button>
  </div>
</div>

<!-- CONVERSATION -->
<div class="screen" id="screen-call">
  <div class="call-header">
    <div class="call-avatar-sm" id="callAvatarSm">🐕</div>
    <div>
      <div class="call-hname" id="callName">Chase</div>
      <div class="call-status"><div class="status-dot"></div> En communication</div>
    </div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="controls">
    <div class="mic-status" id="micStatus" style="color:rgba(255,255,255,0.6)">Le chiot arrive...</div>

    <!-- Ondes sonores (visibles quand le chiot parle) -->
    <div class="sound-waves" id="soundWaves" style="color:#22c55e;">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <!-- BOUTON PRINCIPAL : tape pour que le chiot réponde -->
    <button class="talk-btn busy" id="talkBtn" onclick="onTalkPress()">🐾</button>
    <div class="mic-label" id="micLabel">Attends le chiot...</div>

    <button class="btn-hangup" onclick="hangup()">📵 Raccrocher</button>
  </div>
</div>

<script>
// ── Données personnages ──────────────────────────────────────────────────────
const DOGS = {
  chase:   {name:"Chase",   img:"images/chase.png",   color:"#2563eb", role:"Police",    nbSounds:9},
  stella:  {name:"Stella",  img:"images/stella.png",  color:"#ec4899", role:"Aérienne",  nbSounds:7},
  ruben:   {name:"Ruben",   img:"images/ruben.png",   color:"#16a34a", role:"Recyclage", nbSounds:8},
  everest: {name:"Everest", img:"images/everest.png", color:"#7c3aed", role:"Neige",     nbSounds:7},
  rocky:   {name:"Rocky",   img:"images/rocky.png",   color:"#ea580c", role:"Mécanique", nbSounds:7},
  zuma:    {name:"Zuma",    img:"images/zuma.png",    color:"#0891b2", role:"Marine",    nbSounds:8}
};

// Textes affichés dans les bulles (facultatif — correspond aux MP3)
const DIALOGUES = {
  chase:   ["Wouf ! Je suis là !","Tu veux venir en mission ?","Attention ! Je protège la ville !","Super travail !","On part sauver quelqu'un !","Merci, on forme une bonne équipe !","Fais attention !","Atchou ! Je suis allergique aux chats !","La Patpatrouille est prête !"],
  stella:  ["Wouf ! Je vole dans le ciel !","Regarde les nuages !","Je vois tout d'en haut !","Tu veux voler avec moi ?","Le ciel est très beau !","Tu n'aurais pas vu Ryder ?","Parer au décollage !"],
  ruben:   ["Wouf ! Pas de gaspillage !","Je recycle les objets !","Regarde ma super poubelle !","On garde la planète propre !","Tu es très forte !","Fais attention à ne pas nous déranger !","Appelle Chase, on va avoir besoin de lui !","Bien joué !"],
  everest: ["Wouf ! J'adore la neige !","Je glisse sur la montagne !","Il fait froid ici !","On joue dans la neige ?","Je protège mes amis !","Allons sauver les ours polaires !","Fais attention, la glace est fine !"],
  rocky:   ["Wouf ! Je peux réparer ça !","Regarde mon outil !","Je construis une machine !","Tout fonctionne maintenant !","Super idée !","Tu peux me tenir ça ?","On est tous avec toi !"],
  zuma:    ["Wouf ! J'adore l'eau !","Je nage très vite !","On va sauver quelqu'un !","Splash !","Tu es courageuse !","Vite ! Monte sur mon aéro-glisseur !","Bien joué !","Rip rip wouf !"]
};

// ── État global ──────────────────────────────────────────────────────────────
let currentDog   = null;
let currentDogId = null;
let isBusy       = false;   // true pendant qu'un MP3 joue
let currentAudio = null;
let ringtoneInterval = null, audioCtx = null;
let usedIndices  = [];      // pour ne pas répéter les sons

// ── Fond pattes ──────────────────────────────────────────────────────────────
(function(){
  const bg = document.getElementById('pawBg');
  for(let i=0;i<16;i++){
    const d = document.createElement('div');
    d.className='paw-float'; d.textContent='🐾';
    d.style.left   = Math.random()*100+'%';
    d.style.top    = Math.random()*100+'%';
    d.style.fontSize = (1.5+Math.random()*2.5)+'rem';
    d.style.animationDelay    = (Math.random()*5)+'s';
    d.style.animationDuration = (6+Math.random()*5)+'s';
    bg.appendChild(d);
  }
})();

// ── Grille personnages ───────────────────────────────────────────────────────
(function(){
  const grid = document.getElementById('dogGrid');
  Object.entries(DOGS).forEach(([id,dog])=>{
    const btn = document.createElement('button');
    btn.className = 'dog-card';
    btn.innerHTML = `
      <div class="dog-avatar" style="background:${dog.color};box-shadow:0 8px 24px ${dog.color}66">
        <img src="${dog.img}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">
      </div>
      <div class="dog-name">${dog.name}</div>
      <div class="dog-role">${dog.role}</div>`;
    btn.onclick = ()=>startIncoming(id);
    grid.appendChild(btn);
  });
})();

// ── Sonnerie ─────────────────────────────────────────────────────────────────
function playRingtone(){
  try{
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    let count=0;
    ringtoneInterval = setInterval(()=>{
      if(count>=10)return;
      const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(880,audioCtx.currentTime);
      osc.frequency.setValueAtTime(660,audioCtx.currentTime+0.18);
      gain.gain.setValueAtTime(0.25,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.45);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.45);
      count++;
    },900);
  }catch(e){}
}
function stopRingtone(){
  if(ringtoneInterval){clearInterval(ringtoneInterval);ringtoneInterval=null;}
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}

// ── Navigation ───────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startIncoming(dogId){
  currentDogId = dogId;
  currentDog   = DOGS[dogId];
  usedIndices  = [];
  document.getElementById('incName').textContent = currentDog.name;
  const av = document.getElementById('incAvatar');
  av.innerHTML = `<img src="${currentDog.img}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
  av.style.background  = currentDog.color;
  av.style.boxShadow   = `0 0 60px ${currentDog.color}99`;
  ['ripple1','ripple2','ripple3'].forEach(id=>document.getElementById(id).style.background=currentDog.color);
  document.getElementById('incBg').style.background=`linear-gradient(180deg,#0f0f1a,${currentDog.color}22,#0f0f1a)`;
  showScreen('screen-incoming');
  playRingtone();
}

function declineCall(){
  stopRingtone();
  stopAudio();
  showScreen('screen-select');
}

function acceptCall(){
  stopRingtone();
  isBusy = false;

  const sm = document.getElementById('callAvatarSm');
  sm.innerHTML = `<img src="${currentDog.img}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
  sm.style.background = currentDog.color;
  document.getElementById('callName').textContent = currentDog.name;
  document.getElementById('screen-call').style.background=`linear-gradient(160deg,#0f0f1a,${currentDog.color}20,#0f0f1a)`;
  document.getElementById('chatArea').innerHTML = '';

  setTalkUI('busy');
  setStatus('Le chiot arrive…');
  showScreen('screen-call');

  // Message d'accueil (_0.mp3)
  playSound(`sounds/${currentDogId}/${currentDogId}_0.mp3`, null, ()=>{
    setTalkUI('idle');
    setStatus('Tape le bouton pour parler !');
  });
}

function hangup(){
  stopAudio();
  isBusy = false;
  currentDog   = null;
  currentDogId = null;
  usedIndices  = [];
  showScreen('screen-select');
}

// ── Bouton principal ─────────────────────────────────────────────────────────
function onTalkPress(){
  if(isBusy) return;

  // Choisir un index non encore utilisé
  const total = currentDog.nbSounds; // 1..nbSounds
  let available = [];
  for(let i=1;i<=total;i++) if(!usedIndices.includes(i)) available.push(i);
  if(available.length === 0){ usedIndices=[]; for(let i=1;i<=total;i++) available.push(i); }
  const idx = available[Math.floor(Math.random()*available.length)];
  usedIndices.push(idx);

  // Afficher la bulle texte correspondante
  const dialogues = DIALOGUES[currentDogId] || [];
  const text = dialogues[idx-1] || '…';
  addBubble(text, 'dog');

  // Jouer le MP3
  setTalkUI('playing');
  setStatus(currentDog.name + ' parle…');
  playSound(`sounds/${currentDogId}/${currentDogId}_${idx}.mp3`, null, ()=>{
    setTalkUI('idle');
    setStatus('Tape le bouton pour parler !');
  });
}

// ── Audio ────────────────────────────────────────────────────────────────────
function playSound(file, bubbleText, onEnd){
  stopAudio();
  isBusy = true;
  setSoundWaves(true);

  if(bubbleText) addBubble(bubbleText, 'dog');

  currentAudio = new Audio(file);
  currentAudio.onended = ()=>{
    isBusy = false;
    setSoundWaves(false);
    currentAudio = null;
    if(onEnd) onEnd();
  };
  currentAudio.onerror = ()=>{
    isBusy = false;
    setSoundWaves(false);
    currentAudio = null;
    if(onEnd) onEnd();
  };
  currentAudio.play().catch(()=>{
    isBusy = false;
    setSoundWaves(false);
    currentAudio = null;
    if(onEnd) onEnd();
  });
}

function stopAudio(){
  if(currentAudio){
    try{ currentAudio.pause(); currentAudio.currentTime=0; }catch(e){}
    currentAudio = null;
  }
  isBusy = false;
  setSoundWaves(false);
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function setStatus(txt){
  document.getElementById('micStatus').textContent = txt;
}

function setTalkUI(state){
  const btn = document.getElementById('talkBtn');
  const lbl = document.getElementById('micLabel');
  btn.className = 'talk-btn ' + state;
  if(state === 'idle'){
    btn.textContent = '🐾';
    btn.style.background = `linear-gradient(145deg,${currentDog.color},${currentDog.color}bb)`;
    btn.style.boxShadow  = `0 6px 28px ${currentDog.color}88`;
    lbl.textContent = 'Tape pour que le chiot parle !';
  } else if(state === 'playing'){
    btn.textContent = '🔊';
    btn.style.background = 'linear-gradient(145deg,#22c55e,#15803d)';
    btn.style.boxShadow  = '0 6px 28px rgba(34,197,94,0.6)';
    lbl.textContent = currentDog.name + ' parle…';
  } else {
    btn.textContent = '🐾';
    btn.style.background = '#374151';
    btn.style.boxShadow  = 'none';
    lbl.textContent = 'Attends le chiot…';
  }
}

function setSoundWaves(visible){
  const w = document.getElementById('soundWaves');
  if(visible) w.classList.add('visible');
  else        w.classList.remove('visible');
}

function addBubble(text, who){
  const chat = document.getElementById('chatArea');
  const b = document.createElement('div');
  b.className = 'bubble bubble-' + who;
  if(who==='dog') b.style.background = currentDog.color;
  b.textContent = text;
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
